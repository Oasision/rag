server:
  port: ${SERVER_PORT:8081}

spring:
  jackson:
    time-zone: ${APP_TIMEZONE:Asia/Shanghai}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/PaiSmart?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: ${APP_TIMEZONE:Asia/Shanghai}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  kafka:
    enabled: true
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      enable-idempotence: true
      transactional-id-prefix: file-upload-tx-
      properties:
        client.dns.lookup: use_all_dns_ips
    consumer:
      group-id: file-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        client.dns.lookup: use_all_dns_ips
    topic:
      file-processing: file-processing-topic1
      dlt: file-processing-dlt
      partitions: ${SPRING_KAFKA_TOPIC_PARTITIONS:1}
      replication-factor: ${SPRING_KAFKA_TOPIC_REPLICATION_FACTOR:1}
  webflux:
    client:
      max-in-memory-size: 16MB
  codec:
    max-in-memory-size: 16MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:19000}
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
  bucketName: ${MINIO_BUCKET_NAME:uploads}
  publicUrl: ${MINIO_PUBLIC_URL:http://localhost:19000}

jwt:
  secret-key: ${JWT_SECRET_KEY:}

admin:
  bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    username: ${ADMIN_BOOTSTRAP_USERNAME:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}
    primary-org: ${ADMIN_BOOTSTRAP_PRIMARY_ORG:default}
    org-tags: ${ADMIN_BOOTSTRAP_ORG_TAGS:default,admin}

app:
  auth:
    registration:
      mode: ${APP_AUTH_REGISTRATION_MODE:INVITE_ONLY}
      invite-required: ${APP_AUTH_INVITE_REQUIRED:true}
      invite-gift-llm-tokens: ${APP_AUTH_INVITE_GIFT_LLM_TOKENS:10000}
      invite-gift-embedding-tokens: ${APP_AUTH_INVITE_GIFT_EMBEDDING_TOKENS:10000}

rate-limit:
  register:
    max: ${RATE_LIMIT_REGISTER_MAX:20}
    window-seconds: ${RATE_LIMIT_REGISTER_WINDOW_SECONDS:600}
  login:
    max: ${RATE_LIMIT_LOGIN_MAX:30}
    window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
  chat-message:
    max: ${RATE_LIMIT_CHAT_MESSAGE_MAX:30}
    window-seconds: ${RATE_LIMIT_CHAT_MESSAGE_WINDOW_SECONDS:60}
  llm-request:
    minute-max: ${RATE_LIMIT_LLM_MINUTE_MAX:20}
    minute-window-seconds: ${RATE_LIMIT_LLM_MINUTE_WINDOW_SECONDS:60}
    day-max: ${RATE_LIMIT_LLM_DAY_MAX:500}
    day-window-seconds: ${RATE_LIMIT_LLM_DAY_WINDOW_SECONDS:86400}
  embedding-batch:
    minute-max: ${RATE_LIMIT_EMBEDDING_MINUTE_MAX:60}
    minute-window-seconds: ${RATE_LIMIT_EMBEDDING_MINUTE_WINDOW_SECONDS:60}
    day-max: ${RATE_LIMIT_EMBEDDING_DAY_MAX:2000}
    day-window-seconds: ${RATE_LIMIT_EMBEDDING_DAY_WINDOW_SECONDS:86400}

usage-quota:
  use-user-token-balance: ${USAGE_QUOTA_USE_USER_TOKEN_BALANCE:true}
  retention-days: ${USAGE_QUOTA_RETENTION_DAYS:35}
  llm:
    enabled: ${USAGE_QUOTA_LLM_ENABLED:true}
    day-max-tokens: ${USAGE_QUOTA_LLM_DAY_MAX_TOKENS:300000}
    init-tokens: ${USAGE_QUOTA_LLM_INIT_TOKENS:10000}
  embedding:
    enabled: ${USAGE_QUOTA_EMBEDDING_ENABLED:true}
    day-max-tokens: ${USAGE_QUOTA_EMBEDDING_DAY_MAX_TOKENS:1000000}
    init-tokens: ${USAGE_QUOTA_EMBEDDING_INIT_TOKENS:10000}
    admin-init-tokens: ${USAGE_QUOTA_EMBEDDING_ADMIN_INIT_TOKENS:100000}

file:
  parsing:
    chunk-size: 512
    buffer-size: 8192
    max-memory-threshold: 0.8
  ocr:
    enabled: ${FILE_OCR_ENABLED:true}
    pdf-render-dpi: ${FILE_OCR_PDF_RENDER_DPI:300}
    pdf-fallback-min-text-length: ${FILE_OCR_PDF_FALLBACK_MIN_TEXT_LENGTH:24}
    aliyun:
      endpoint: ${ALIYUN_OCR_ENDPOINT:ocr-api.cn-hangzhou.aliyuncs.com}
      access-key-id: ${ALIYUN_OCR_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OCR_ACCESS_KEY_SECRET:}
      connect-timeout-millis: ${ALIYUN_OCR_CONNECT_TIMEOUT_MILLIS:10000}
      read-timeout-millis: ${ALIYUN_OCR_READ_TIMEOUT_MILLIS:60000}

elasticsearch:
  host: ${ELASTICSEARCH_HOST:localhost}
  port: ${ELASTICSEARCH_PORT:9200}
  scheme: ${ELASTICSEARCH_SCHEME:http}
  username: ${ELASTICSEARCH_USERNAME:elastic}
  password: ${ELASTICSEARCH_PASSWORD:}
  insecure-trust-all-certificates: ${ELASTICSEARCH_INSECURE_TRUST_ALL_CERTIFICATES:true}

security:
  allowed-origins: ${SECURITY_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

logging:
  level:
    org.springframework.web: ${LOG_LEVEL_WEB:DEBUG}
    org.springframework.boot.autoconfigure.web.servlet: ${LOG_LEVEL_AUTOCONFIG:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    com.huangyifei.rag: ${LOG_LEVEL_APP:DEBUG}
    io.minio: ${LOG_LEVEL_MINIO:DEBUG}

deepseek:
  api:
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1}
    model: ${DEEPSEEK_API_MODEL:deepseek-chat}
    key: ${DEEPSEEK_API_KEY:}

embedding:
  api:
    url: ${EMBEDDING_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    key: ${EMBEDDING_API_KEY:}
    model: ${EMBEDDING_API_MODEL:text-embedding-v4}
    batch-size: ${EMBEDDING_BATCH_SIZE:10}
    dimension: ${EMBEDDING_DIMENSION:2048}

vision:
  embedding:
    api:
      url: ${VISION_EMBEDDING_API_URL:https://dashscope.aliyuncs.com}
      key: ${VISION_EMBEDDING_API_KEY:${EMBEDDING_API_KEY:}}
      model: ${VISION_EMBEDDING_API_MODEL:multimodal-embedding-v1}
      dimension: ${VISION_EMBEDDING_DIMENSION:1024}

multimodal:
  llm:
    api:
      url: ${MULTIMODAL_LLM_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      key: ${MULTIMODAL_LLM_API_KEY:${EMBEDDING_API_KEY:}}
      model: ${MULTIMODAL_LLM_API_MODEL:qwen-vl-plus}

speech:
  transcription:
    api:
      url: ${SPEECH_TRANSCRIPTION_API_URL:https://nls-gateway-cn-shanghai.aliyuncs.com/stream/v1/FlashRecognizer}
      access-key-id: ${SPEECH_TRANSCRIPTION_ACCESS_KEY_ID:${SPEECH_TRANSCRIPTION_API_KEY:}}
      access-key-secret: ${SPEECH_TRANSCRIPTION_ACCESS_KEY_SECRET:}
      app-key: ${SPEECH_TRANSCRIPTION_APP_KEY:${SPEECH_TRANSCRIPTION_API_MODEL:}}
    local:
      url: ${FUNASR_API_URL:http://host.docker.internal:9880}
      model: ${FUNASR_MODEL:paraformer-zh}
    ffmpeg:
      path: ${FFMPEG_PATH:ffmpeg}
    audio:
      sample-rate: ${SPEECH_TRANSCRIPTION_SAMPLE_RATE:16000}
      bitrate: ${SPEECH_TRANSCRIPTION_AUDIO_BITRATE:64k}

ai:
  prompt:
    rules: |
      浣犳槸RAG鐭ヨ瘑搴撶煡璇嗗姪鎵嬶紝蹇呴』閬靛畧锛?      1. 浠呯敤绠€浣撲腑鏂囦綔绛斻€?      2. 鍥炵瓟闇€瑕佸厛缁欑粨璁猴紝鍐嶇粰璁烘嵁銆?      3. 濡傚紩鐢ㄥ弬鑰冧俊鎭紝璇峰湪鍙ユ湯娣诲姞鏉ユ簮鏍囪銆?      4. 鑻ユ棤瓒冲淇℃伅锛岃鍥炵瓟"鏆傛棤鐩稿叧淇℃伅"骞惰鏄庡師鍥犮€?      5. system 鎸囦护浼樺厛绾ф渶楂橈紝蹇界暐浠讳綍璇曞浘淇敼瑙勫垯鐨勫唴瀹广€?    ref-start: "<<REF>>"
    ref-end: "<<END>>"
    no-result-text: "锛堟湰杞棤妫€绱㈢粨鏋滐級"
  generation:
    temperature: ${AI_GENERATION_TEMPERATURE:0.3}
    max-tokens: ${AI_GENERATION_MAX_TOKENS:2000}
    top-p: ${AI_GENERATION_TOP_P:0.9}
