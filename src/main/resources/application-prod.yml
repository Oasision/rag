spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

admin:
  bootstrap:
    enabled: false

app:
  auth:
    registration:
      mode: INVITE_ONLY
      invite-required: true
      invite-gift-llm-tokens: ${APP_AUTH_INVITE_GIFT_LLM_TOKENS:10000}
      invite-gift-embedding-tokens: ${APP_AUTH_INVITE_GIFT_EMBEDDING_TOKENS:10000}

elasticsearch:
  insecure-trust-all-certificates: false

security:
  allowed-origins: ${SECURITY_ALLOWED_ORIGINS}

logging:
  level:
    org.springframework.web: INFO
    org.springframework.boot.autoconfigure.web.servlet: INFO
    org.springframework.security: INFO
    com.huangyifei.rag: INFO
    io.minio: WARN
