server:
  port: 8081

spring:
  jackson:
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:mysql://localhost:3306/PaiSmart?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: PaiSmart2025
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: Asia/Shanghai
  data:
    redis:
      host: localhost
      port: 6379
      password: PaiSmart2025
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  kafka:
    enabled: true
    bootstrap-servers: 127.0.0.1:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      enable-idempotence: true
      transactional-id-prefix: file-upload-tx-
      properties:
        client.dns.lookup: use_all_dns_ips
    consumer:
      group-id: file-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        client.dns.lookup: use_all_dns_ips
    topic:
      file-processing: file-processing-topic1
      dlt: file-processing-dlt
      partitions: 1
      replication-factor: 1
  webflux:
    client:
      max-in-memory-size: 16MB
  codec:
    max-in-memory-size: 16MB

minio:
  endpoint: http://localhost:19000
  accessKey: admin
  secretKey: PaiSmart2025
  bucketName: uploads
  publicUrl: http://localhost:19000

jwt:
  secret-key: "PXrQbuCwXwOZzkML/Vm2S5rSwt1iybvmKtGDzVEu+Hc="

admin:
  bootstrap:
    username: admin
    password: admin123
    primary-org: default
    org-tags: default,admin

app:
  auth:
    registration:
      mode: OPEN
      invite-gift-llm-tokens: 10000
      invite-gift-embedding-tokens: 10000

rate-limit:
  register:
    max: 20
    window-seconds: 600
  login:
    max: 30
    window-seconds: 60
  chat-message:
    max: 30
    window-seconds: 60
  llm-request:
    minute-max: 20
    minute-window-seconds: 60
    day-max: 500
    day-window-seconds: 86400
  embedding-batch:
    minute-max: 60
    minute-window-seconds: 60
    day-max: 2000
    day-window-seconds: 86400

usage-quota:
  use-user-token-balance: true
  retention-days: 35
  llm:
    enabled: true
    day-max-tokens: 300000
    init-tokens: 10000
  embedding:
    enabled: true
    day-max-tokens: 1000000
    init-tokens: 10000
    admin-init-tokens: 100000

file:
  parsing:
    chunk-size: 512
    buffer-size: 8192
    max-memory-threshold: 0.8
  ocr:
    enabled: ${FILE_OCR_ENABLED:true}
    pdf-render-dpi: ${FILE_OCR_PDF_RENDER_DPI:300}
    pdf-force-ocr: ${FILE_OCR_PDF_FORCE_OCR:true}
    pdf-fallback-min-text-length: ${FILE_OCR_PDF_FALLBACK_MIN_TEXT_LENGTH:24}
    aliyun:
      endpoint: ${ALIYUN_OCR_ENDPOINT:ocr-api.cn-hangzhou.aliyuncs.com}
      access-key-id: ${ALIYUN_OCR_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OCR_ACCESS_KEY_SECRET:}
      connect-timeout-millis: ${ALIYUN_OCR_CONNECT_TIMEOUT_MILLIS:10000}
      read-timeout-millis: ${ALIYUN_OCR_READ_TIMEOUT_MILLIS:60000}

